version: 2.1

orbs:
  node: circleci/node@7.2.1

executors:
  trivy:
    docker:
      # digest 固定 — 対応タグ: 0.69.3
      - image: aquasec/trivy@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c
  node:
    docker:
      - image: cimg/node:22.16


jobs:
  # コーディネーター
  preparation-gate:
    type: no-op

  # ── 1. シークレットリーク検出（最速 fail）──
  secret-scan:
    executor: trivy
    resource_class: small
    steps:
      - checkout
      - run:
          name: Scan for leaked secrets
          command: |
            trivy fs . \
              --scanners secret \
              --exit-code 1 \
              --quiet

  # ── 2. 依存インストール ──
  install-deps:
    executor: node
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - persist_to_workspace:
          root: .
          paths:
            - .

  # ── 3a. SBOM 生成 + SCA（脆弱性スキャン）──
  sbom-and-vuln-scan:
    executor: trivy
    working_directory: /root/project
    steps:
      - attach_workspace:
          at: /root/project
      - run:
          name: Generate SBOM (CycloneDX)
          command: |
            trivy fs /root/project \
              --format cyclonedx \
              --output /root/project/sbom.cdx.json \
              --quiet
      - run:
          name: Scan SBOM for vulnerabilities
          command: |
            trivy sbom /root/project/sbom.cdx.json \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              --quiet
      - store_artifacts:
          path: /root/project/sbom.cdx.json
          destination: sbom/cyclonedx.json

  # ── 3b. ライセンスコンプライアンス ──
  license-check:
    executor: trivy
    resource_class: small
    working_directory: /root/project
    steps:
      - attach_workspace:
          at: /root/project
      - run:
          name: License compliance check
          command: |
            trivy fs /root/project \
              --scanners license \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              --quiet

  # ── 4. ビルド ──
  build:
    executor: node
    steps:
      - attach_workspace:
          at: .
      - run: npm run build
      - persist_to_workspace:
          root: .
          paths:
            - dist


workflows:
  build-scan-deploy:
    jobs:
      # シークレット検出と依存インストールを並列実行
      - secret-scan
      - install-deps

      # 両方成功したらスキャンフェーズへ（no-op: クレジット消費なし）
      - preparation-gate:
          requires:
            - secret-scan
            - install-deps

      # 2つのスキャンを並列実行 — 全パスしないとビルドに進めない
      - sbom-and-vuln-scan:
          requires:
            - preparation-gate
      - license-check:
          requires:
            - preparation-gate

      # 全スキャン通過後にビルド
      - build:
          requires:
            - sbom-and-vuln-scan
            - license-check