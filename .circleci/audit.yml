# .circleci/audit.yml
version: 2.1

orbs:
  slack: circleci/slack@5.1.1

jobs:
  audit:
    docker:
      - image: cimg/node:22.0
    resource_class: small
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci --ignore-scripts
      - run:
          name: Run npm audit
          command: |
            set +e
            npm audit --audit-level=high --json > audit-report.json 2> audit-stderr.txt
            code=$?
            set -e
            exit "$code"
      - run:
          name: Summarize npm audit for Slack
          when: on_fail
          command: |
            if [ -f audit-report.json ]; then
              SUMMARY="$(node .circleci/format-npm-audit-for-slack.cjs audit-report.json)" || SUMMARY="audit-report.json の要約に失敗しました。"
            else
              SUMMARY="audit-report.json が見つかりません。"
            fi
            printf 'export AUDIT_SLACK_SUMMARY=%q\n' "$SUMMARY" >> "$BASH_ENV"
      - store_artifacts:
          path: audit-report.json
          destination: audit/audit-report.json
      - run:
          name: Send Slack notification
          when: on_fail
          command: |
            # Slack通知は失敗してもジョブを失敗させない（常に成功を返す）
            set +e
            if [ -n "${SLACK_WEBHOOK:-}" ]; then
              curl -X POST "${SLACK_WEBHOOK}" \
                -H 'Content-Type: application/json' \
                -d "{
                  \"blocks\": [
                    {
                      \"type\": \"header\",
                      \"text\": {
                        \"type\": \"plain_text\",
                        \"text\": \"npm audit 失敗\",
                        \"emoji\": true
                      }
                    },
                    {
                      \"type\": \"section\",
                      \"text\": {
                        \"type\": \"mrkdwn\",
                        \"text\": \"*リポジトリ:* ${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}\n*ブランチ:* ${CIRCLE_BRANCH}\n*ビルド:* <${CIRCLE_BUILD_URL}|CircleCI で開く>\n\n*npm audit 要約*\n${AUDIT_SLACK_SUMMARY}\"
                      }
                    }
                  ]
                }" 2>&1 | head -5 || true
              echo "Slack通知を試みました"
            else
              echo "SLACK_WEBHOOK が設定されていないため、Slack通知をスキップします"
            fi
            # このステップは常に成功を返す
            exit 0

workflows:
  nightly-audit:
    jobs:
      - audit:
          context:
            - private-slack
            #- slack-notifications  # Slack Webhook URL を格納した Context
