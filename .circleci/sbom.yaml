version: 2.1

jobs:
  sbom-and-scan:
    docker:
      - image: aquasec/trivy:0.69.3
    steps:
      - checkout

      - run:
          name: Generate SBOM (CycloneDX)
          command: |
            trivy fs . \
              --format cyclonedx \
              --output sbom.cdx.json \
              --quiet

      - run:
          name: Scan SBOM for vulnerabilities
          command: |
            trivy sbom sbom.cdx.json \
              --severity HIGH,CRITICAL \
              --quiet \
              --exit-code 1

      - store_artifacts:
          path: sbom.cdx.json
          destination: sbom/cyclonedx.json

workflows:
  sbom-pipeline:
    jobs:
      - sbom-and-scan