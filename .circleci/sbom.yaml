version: 2.1

jobs:
  generate-sbom:
    docker:
      - image: aquasec/trivy:0.69.3  # latestは使用しない
    steps:
      - checkout
      - run:
          name: Generate SBOM (CycloneDX)
          command: |
            trivy fs . \
              --format cyclonedx \
              --output sbom.cdx.json \
              --quiet
      - store_artifacts:
          path: sbom.cdx.json
          destination: sbom/cyclonedx.json

workflows:
  sbom-pipeline:
    jobs:
      - generate-sbom
